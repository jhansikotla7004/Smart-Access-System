; PlatformIO Project Configuration File
; Smart Access Security System
; Board: STM32 NUCLEO-L432KC
; Module: EENG1030 Embedded Systems

[env:nucleo_l432kc]
platform  = ststm32
board     = nucleo_l432kc
framework = stm32cube

; Serial monitor baud rate (matches UART2 config in firmware)
monitor_speed = 115200

; Upload via on-board ST-LINK
upload_protocol = stlink

; Build flags
build_flags =
    -DUSE_HAL_DRIVER
    -DSTM32L432xx
    -Wall
    -Wextra

; Library dependencies
lib_deps =
    ; Adafruit ST7735 and GFX Library (provides full font + drawing primitives)
    adafruit/Adafruit ST7735 and ST7789 Library @ ^1.10.3
    adafruit/Adafruit GFX Library @ ^1.11.9

; Source filter — include src/ only
src_filter = +<src/>
